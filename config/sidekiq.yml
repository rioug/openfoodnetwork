---

:verbose: false
:concurrency: 5

:queues:
  - default
  - mailers

:scheduler:
  :schedule:
    HeartbeatJob:
      every: ["5m", first_in: "0s"]
    SubscriptionPlacementJob:
      every: "5m"
    SubscriptionConfirmJob:
      every: "5m"
    TriggerOrderCyclesToOpenJob:
      every: "5m"
    OrderCycleClosingJob:
      every: "5m"
    RakeJob:
      args: ["ofn:data:remove_transient_data"]
      cron: "30 4 1 * *"
